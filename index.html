<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game Lobby - No Alert Edition</title>
    <style>
        /* --- 1. 基礎鎖定與禁用預設特效 --- */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background: #020617;
            font-family: sans-serif; touch-action: none;
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none;
            /* 徹底移除所有 iOS 點擊藍色高亮 */
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        /* --- 2. 自定義 Toast 提示 (取代 alert) --- */
        #toast {
            position: fixed; top: -50px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); color: #000; 
            padding: 10px 30px; border-radius: 50px; font-weight: bold;
            z-index: 3000; opacity: 0; transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3); font-size: 18px;
        }
        #toast.show { top: 40px; opacity: 1; }

        /* --- 3. UI 元件 --- */
        .bg-layer {
            position: fixed; top: -50vh; left: -50vw; width: 200vw; height: 200vh;
            background: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(135deg,#020617,#0a1b3a);
            background-size: 40px 40px, 40px 40px, cover; z-index: -1; pointer-events: none;
        }

        #tooltip {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(50, 50, 50, 0.9); backdrop-filter: blur(10px);
            padding: 10px 35px; border-radius: 12px; font-size: 18px; color: white;
            opacity: 0; transition: opacity 0.1s; z-index: 1000; pointer-events: none;
        }

        .character { position: absolute; bottom: 30px; left: 30px; width: 50%; height: 90%; pointer-events: none; }
        .character img { max-height: 100%; object-fit: contain; animation: floating 8s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }

        .player { position: absolute; top: 50px; left: 80px; display: flex; align-items: center; gap: 15px; color: white; z-index: 20; }
        .avatar { width: 85px; height: 85px; border-radius: 20px; background: #ddd; border: 3px solid rgba(255,255,255,0.2); }

        .menu { position: absolute; right: 65px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 30px; }
        .btn {
            padding: 28px 0; width: 330px; border-radius: 20px;
            background: #4c8bf5; border: none; color: white; font-size: 26px;
            transition: all 0.15s ease-out; text-align: center;
        }
        .btn-small { width: 155px; }
        .active-btn { background: #6aa6ff !important; box-shadow: 0 0 35px rgba(106, 166, 255, 0.9); transform: scale(1.05); }

        /* --- 彈窗樣式 --- */
        #profile-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 500; display: none;
        }
        .tab-btn { padding: 20px; font-size: 22px; color: white; border-radius: 10px; margin-bottom: 10px; transition: all 0.3s; }
        .tab-active { color: #6aa6ff !important; transform: scale(1.1); border: 1px solid rgba(106, 166, 255, 0.4); }
        .input-field { 
            width: 400px; padding: 15px; font-size: 20px; border-radius: 10px; 
            border: 1px solid #4c8bf5; background: rgba(255,255,255,0.1); color: white; outline: none;
        }
        .action-btn {
            margin-top: 35px; border: none; color: white; border-radius: 12px;
            padding: 12px 45px; font-size: 20px; font-weight: bold;
        }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <div class="bg-layer"></div>
    <div id="tooltip"></div>
    <div id="toast">提示訊息</div>

    <div id="profile-overlay">
        <div class="interactive" data-tip="關閉視窗" onclick="closeProfile()" style="position:absolute; top:40px; left:40px; width:60px; height:60px; color:white; font-size:40px;">✕</div>
        <div id="modal-container" style="display:flex; height:100%; padding:100px 150px;">
            <div style="width:200px; display:flex; flex-direction:column; gap:20px; border-right:1px solid rgba(255,255,255,0.2);">
                <div class="interactive tab-btn" id="tab-avatar" data-tip="頭像設定" onclick="switchTab('avatar')">頭像</div>
                <div class="interactive tab-btn" id="tab-name" data-tip="修改名稱" onclick="switchTab('name')">姓名</div>
                <div class="interactive tab-btn" id="tab-code" data-tip="兌換序號" onclick="switchTab('code')">兌換碼</div>
            </div>
            <div id="tab-content" style="flex:1; padding-left:100px; padding-top:20px; color:white;"></div>
        </div>
    </div>

    <div class="lobby-ui">
        <div class="character"><img src="baikui_normal.png" alt="baikui"></div>
        <div class="interactive player" data-tip="開啟玩家資料" onclick="openProfile()">
            <div class="avatar"></div>
            <div>
                <div class="name" style="font-size: 30px; font-weight: bold;">Fudeya</div>
                <div class="rank" style="opacity: 0.6; font-size: 18px;">RK 0</div>
            </div>
        </div>
        <div class="menu">
            <button class="interactive btn" data-tip="進入遊戲" data-target="play.html">遊玩</button>
            <div style="display: flex; gap: 20px;">
                <button class="interactive btn btn-small" data-tip="查看圖鑑" data-target="collection.html">圖鑑</button>
                <button class="interactive btn btn-small" data-tip="前往商店" data-target="shop.html">店</button>
            </div>
        </div>
    </div>

    <script>
        const tooltip = document.getElementById('tooltip');
        const toast = document.getElementById('toast');
        const profileOverlay = document.getElementById('profile-overlay');
        let activeFingerId = null;
        let currentActiveEl = null;

        // 【重點修正】彈出提示 (不跳出文字視窗)
        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function openProfile() { profileOverlay.style.display = 'block'; switchTab('avatar'); }
        function closeProfile() { 
            document.querySelectorAll('input').forEach(i => i.blur());
            profileOverlay.style.display = 'none'; 
            window.scrollTo(0, 0); 
        }

        function switchTab(type) {
            const container = document.getElementById('tab-content');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('tab-active'));
            if (type === 'avatar') {
                document.getElementById('tab-avatar').classList.add('tab-active');
                container.innerHTML = `<h2>頭像設定</h2><p style="opacity:0.5">目前尚未開放更換</p>`;
            } 
            else if (type === 'name') {
                document.getElementById('tab-name').classList.add('tab-active');
                container.innerHTML = `<h2>修改玩家名稱</h2>
                    <input type="text" id="newNameInput" class="input-field" placeholder="點擊輸入...">
                    <br><button class="interactive action-btn" data-tip="保存名稱修改" style="background:#4c8bf5;" onclick="saveName()">保存修改</button>`;
            } 
            else if (type === 'code') {
                document.getElementById('tab-code').classList.add('tab-active');
                container.innerHTML = `<h2>兌換代碼</h2>
                    <input type="text" id="codeInput" class="input-field" placeholder="輸入序號...">
                    <br><button class="interactive action-btn" data-tip="確認兌換代碼" style="background:#ffd54f; color:#000;" onclick="redeemCode()">確認兌換</button>`;
            }
        }

        function saveName() {
            const val = document.getElementById('newNameInput').value;
            if(val) {
                document.querySelector('.player .name').innerText = val;
                document.getElementById('newNameInput').blur();
                showToast("✅ 名稱已成功儲存！");
                setTimeout(() => window.scrollTo(0, 0), 100);
            }
        }

        function redeemCode() {
            const val = document.getElementById('codeInput').value;
            if(val) {
                document.getElementById('codeInput').blur();
                showToast("❌ 序號錯誤或已失效");
                setTimeout(() => window.scrollTo(0, 0), 100);
            }
        }

        // --- 觸控邏輯 ---
        function checkCollision(x, y) {
            let hit = null;
            const isOverlayOpen = profileOverlay.style.display === 'block';
            document.querySelectorAll('.interactive').forEach(el => {
                if (isOverlayOpen && !profileOverlay.contains(el)) return;
                const rect = el.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) hit = el;
            });
            return hit;
        }

        function handleMove(x, y) {
            const hitEl = checkCollision(x, y);
            if (hitEl !== currentActiveEl) {
                if (currentActiveEl) currentActiveEl.classList.remove('active-btn');
                if (hitEl) {
                    hitEl.classList.add('active-btn');
                    tooltip.innerText = hitEl.getAttribute('data-tip') || "";
                    tooltip.style.opacity = '1';
                } else { tooltip.style.opacity = '0'; }
                currentActiveEl = hitEl;
            }
        }

        window.addEventListener('touchstart', (e) => {
            const touch = e.changedTouches[0];
            // 防止 iOS 藍框：除了 input 以外全都阻止預設
            if (touch.target.tagName !== 'INPUT') e.preventDefault();
            
            if (activeFingerId === null) {
                activeFingerId = touch.identifier;
                handleMove(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === activeFingerId) handleMove(t.clientX, t.clientY);
            }
            if (!e.target.closest('.input-field')) e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === activeFingerId) {
                    if (currentActiveEl) {
                        const target = currentActiveEl.getAttribute('data-target');
                        if (target) window.location.href = target;
                        else currentActiveEl.click();
                        currentActiveEl.classList.remove('active-btn');
                    }
                    activeFingerId = null;
                    currentActiveEl = null;
                    tooltip.style.opacity = '0';
                }
            }
        });

        function handleGlobalClick(e) {
            if (e.target.tagName !== 'INPUT') {
                document.querySelectorAll('input').forEach(i => i.blur());
                setTimeout(() => window.scrollTo(0,0), 100);
            }
        }
    </script>
</body>
</html>
