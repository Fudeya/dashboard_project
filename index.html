<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game Lobby - iPad Final</title>
    <style>
        /* 基礎樣式：鎖死背景不准滑動 */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background: #020617;
            font-family: sans-serif; color: white;
        }

        /* 漸層背景 */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(135deg,#020617,#0a1b3a);
            background-size: 40px 40px, 40px 40px, cover;
            z-index: -1;
        }

        /* 主畫面容器 */
        #main-ui { width: 100%; height: 100%; position: relative; z-index: 10; }
        
        /* 物理遮罩：彈窗開起時擋住下層所有點擊 */
        #ui-blocker {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 400; display: none; background: transparent;
        }

        /* 角色與玩家資訊 */
        .character { position: absolute; bottom: 30px; left: 30px; width: 50%; height: 90%; pointer-events: none; }
        .character img { max-height: 100%; object-fit: contain; }
        .player { position: absolute; top: 50px; left: 80px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar { width: 85px; height: 85px; border-radius: 20px; background: #ddd; border: 3px solid rgba(255,255,255,0.2); }
        .resources { position: absolute; bottom: 80px; left: 80px; font-size: 22px; }

        /* 按鈕區 */
        .settings {
            position: absolute; top: 25%; left: 60%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; background: white; color: black;
            clip-path: polygon(25% 6%, 75% 6%, 100% 50%, 75% 94%, 25% 94%, 0% 50%);
            display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold;
        }
        .menu { position: absolute; right: 65px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 30px; }
        .btn { padding: 28px 0; width: 330px; border-radius: 20px; background: #4c8bf5; border: none; color: white; font-size: 26px; cursor: pointer; }
        .btn-small { width: 155px; }

        /* 彈窗：z-index 必須最高 */
        #profile-overlay {
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); 
            z-index: 500; display: none;
        }

        .tab-btn { padding: 20px; font-size: 22px; color: white; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; margin-bottom: 15px; text-align: center; }
        .tab-active { background: #4c8bf5 !important; box-shadow: 0 0 15px #4c8bf5; }
        
        /* 輸入框優化：放在偏上方，避免 iPad 鍵盤推擠 */
        .input-field { width: 80%; max-width: 400px; padding: 18px; font-size: 22px; border-radius: 12px; border: 2px solid #4c8bf5; background: #000; color: white; margin-top: 20px; }
        .save-btn { padding: 15px 40px; background: #4c8bf5; color: white; border: none; border-radius: 10px; font-size: 20px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div id="ui-blocker"></div> <div id="main-ui">
    <div class="character"><img src="baikui_normal.png" alt="baikui"></div>
    <div class="player" onclick="openProfile()">
        <div class="avatar"></div>
        <div>
            <div class="name" style="font-size: 30px; font-weight: bold;">Fudeya</div>
            <div class="rank" style="opacity: 0.6; font-size: 18px;">RK 0</div>
        </div>
    </div>
    <div class="resources">
        <div>銅: 0</div>
        <div style="color: #ffd54f;">金線材: 0</div>
    </div>
    <div class="settings" onclick="alert('設定')">設定</div>
    <div class="menu">
        <button class="btn" onclick="location.href='play.html'">遊玩</button>
        <button class="btn" onclick="location.href='notebook.html'">分析筆記本</button>
        <div style="display: flex; gap: 20px;">
            <button class="btn btn-small" onclick="location.href='collection.html'">圖鑑</button>
            <button class="btn btn-small" onclick="location.href='shop.html'">店</button>
        </div>
    </div>
</div>

<div id="profile-overlay">
    <div onclick="closeProfile()" style="position:absolute; top:40px; left:40px; width:60px; height:60px; color:white; font-size:45px; cursor:pointer; z-index:600;">✕</div>
    <div style="display:flex; height:100%; padding:80px 50px;">
        <div style="width:220px; border-right:1px solid rgba(255,255,255,0.2); padding-top:40px;">
            <div class="tab-btn" id="tab-avatar" onclick="switchTab('avatar')">頭像</div>
            <div class="tab-btn" id="tab-name" onclick="switchTab('name')">姓名</div>
            <div class="tab-btn" id="tab-code" onclick="switchTab('code')">兌換碼</div>
        </div>
        <div id="tab-content" style="flex:1; padding-left:60px; padding-top:40px;"></div>
    </div>
</div>

<script>
    const profileOverlay = document.getElementById('profile-overlay');
    const uiBlocker = document.getElementById('ui-blocker');

    function openProfile() {
        profileOverlay.style.display = 'block';
        uiBlocker.style.display = 'block';
        switchTab('avatar');
    }

    // --- 修改這裡：關閉時強制歸位 ---
    function closeProfile() {
        profileOverlay.style.display = 'none';
        uiBlocker.style.display = 'none';
        
        // 1. 立即歸位
        window.scrollTo(0, 0); 
        // 2. 針對 iPad 的延遲補強 (防止鍵盤縮回動畫造成的偏移)
        setTimeout(() => {
            window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
            document.documentElement.scrollTop = 0;
            document.body.scrollTop = 0;
        }, 100);
    }

    function switchTab(type) {
        const container = document.getElementById('tab-content');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        
        if (type === 'avatar') {
            document.getElementById('tab-avatar').classList.add('tab-active');
            container.innerHTML = `<h1>頭像設定</h1><p>暫無內容</p>`;
        } else if (type === 'name') {
            document.getElementById('tab-name').classList.add('tab-active');
            container.innerHTML = `<h1>修改玩家名稱</h1>
                <input type="text" id="newNameInput" class="input-field" placeholder="請輸入名字...">
                <br><button class="save-btn" onclick="saveName()">儲存變更</button>`;
        } else if (type === 'code') {
            document.getElementById('tab-code').classList.add('tab-active');
            container.innerHTML = `<h1>兌換獎勵碼</h1>
                <input type="text" id="codeInput" class="input-field" placeholder="輸入序號...">
                <br><button class="save-btn" style="background:#ffd54f; color:black;" onclick="alert('無效代碼')">兌換</button>`;
        }
    }

    function saveName() {
        const val = document.getElementById('newNameInput').value;
        if(val && val.trim() !== "") {
            document.querySelector('.player .name').innerText = val;
            alert('修改成功！');
            // 存檔後也強制歸位，避免畫面卡住
            window.scrollTo(0, 0);
        }
    }

    // 監聽鍵盤收起的動作
    document.addEventListener('focusout', () => {
        setTimeout(() => { window.scrollTo(0, 0); }, 50);
    });
</script>

</body>
</html>
