<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game Lobby - Stable</title>
    <style>
        /* 基礎鎖定：徹底禁止捲動 */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            position: fixed; 
            background: #020617;
            font-family: sans-serif;
            touch-action: none; /* 禁止瀏覽器預設滑動，但允許點擊 */
        }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(135deg,#020617,#0a1b3a);
            background-size: 40px 40px, 40px 40px, cover;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: -40px 40px; } }

        /* 主畫面容器：彈窗開啟時我們會讓這裡「無法點擊」 */
        #main-ui {
            width: 100%; height: 100%;
            position: relative;
        }

        /* 彈窗遮罩 */
        #profile-overlay {
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
            z-index: 500; display: none;
            touch-action: auto; /* 彈窗內允許正常觸摸 */
        }

        /* 其他 UI 樣式保持不變... */
        .character { position: absolute; bottom: 30px; left: 30px; width: 50%; height: 90%; pointer-events: none; }
        .character img { max-height: 100%; object-fit: contain; animation: floating 8s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }

        .player { position: absolute; top: 50px; left: 80px; display: flex; align-items: center; gap: 15px; cursor: pointer; z-index: 20; color: white; }
        .avatar { width: 85px; height: 85px; border-radius: 20px; background: #ddd; border: 3px solid rgba(255,255,255,0.2); }
        .resources { position: absolute; bottom: 80px; left: 80px; font-size: 22px; color: white; }

        .settings {
            position: absolute; top: 25%; left: 60%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; background: white; color: black;
            clip-path: polygon(25% 6%, 75% 6%, 100% 50%, 75% 94%, 25% 94%, 0% 50%);
            display: flex; align-items: center; justify-content: center; font-size: 26px; z-index: 10;
        }

        .menu { position: absolute; right: 65px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 30px; }
        .btn { padding: 28px 0; width: 330px; border-radius: 20px; background: #4c8bf5; border: none; color: white; font-size: 26px; text-align: center; cursor: pointer; }
        .btn-small { width: 155px; }

        .tab-btn { padding: 20px; font-size: 22px; color: white; background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; margin-bottom: 10px; }
        .tab-active { background: #4c8bf5 !important; }
        .input-field { width: 400px; padding: 15px; font-size: 20px; border-radius: 10px; border: 1px solid #4c8bf5; background: rgba(0,0,0,0.5); color: white; }
        
        #tooltip { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(60,60,60,0.8); padding: 10px 30px; border-radius: 10px; opacity: 0; color: white; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<div id="tooltip"></div>

<div id="main-ui">
    <div class="character"><img src="baikui_normal.png" alt="baikui"></div>
    <div class="player" onclick="openProfile()">
        <div class="avatar"></div>
        <div>
            <div class="name" style="font-size: 30px; font-weight: bold;">Fudeya</div>
            <div class="rank" style="opacity: 0.6; font-size: 18px;">RK 0</div>
        </div>
    </div>
    <div class="resources">
        <div>銅: 0</div>
        <div style="color: #ffd54f;">金線材: 0</div>
    </div>
    <div class="settings" onclick="alert('設定')">設定</div>
    <div class="menu">
        <button class="btn" onclick="location.href='play.html'">遊玩</button>
        <button class="btn" onclick="location.href='notebook.html'">分析筆記本</button>
        <div style="display: flex; gap: 20px;">
            <button class="btn btn-small" onclick="location.href='collection.html'">圖鑑</button>
            <button class="btn btn-small" onclick="location.href='shop.html'">店</button>
        </div>
    </div>
</div>

<div id="profile-overlay">
    <div onclick="closeProfile()" style="position:absolute; top:40px; left:40px; width:60px; height:60px; color:white; font-size:40px; cursor:pointer;">✕</div>
    <div style="display:flex; height:100%; padding:100px;">
        <div style="width:200px; border-right:1px solid rgba(255,255,255,0.2); padding-right:20px;">
            <div class="tab-btn" id="tab-avatar" onclick="switchTab('avatar')">頭像</div>
            <div class="tab-btn" id="tab-name" onclick="switchTab('name')">姓名</div>
        </div>
        <div id="tab-content" style="flex:1; padding-left:50px; color:white; padding-top:20px;"></div>
    </div>
</div>

<script>
    const mainUI = document.getElementById('main-ui');
    const profileOverlay = document.getElementById('profile-overlay');

    function openProfile() {
        profileOverlay.style.display = 'block';
        mainUI.style.pointerEvents = 'none'; // 重要：彈窗開時，主畫面按鈕點不到
        switchTab('avatar');
    }

    function closeProfile() {
        profileOverlay.style.display = 'none';
        mainUI.style.pointerEvents = 'auto'; // 重要：關閉後恢復點擊
    }

    function switchTab(type) {
        const container = document.getElementById('tab-content');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        if (type === 'avatar') {
            document.getElementById('tab-avatar').classList.add('tab-active');
            container.innerHTML = `<h2>頭像設定</h2>`;
        } else {
            document.getElementById('tab-name').classList.add('tab-active');
            container.innerHTML = `<h2>修改玩家名稱</h2>
            <input type="text" id="newNameInput" class="input-field" placeholder="點擊輸入...">
            <button onclick="saveName()" style="padding:10px 20px; margin-top:10px;">儲存</button>`;
        }
    }

    function saveName() {
        const val = document.getElementById('newNameInput').value;
        if(val) { document.querySelector('.name').innerText = val; alert('OK'); }
    }

    // iPad 鍵盤修復：強行歸位
    window.addEventListener('blur', () => { window.scrollTo(0,0); });
    document.addEventListener('focusout', () => {
        setTimeout(() => { window.scrollTo(0,0); }, 10);
    });

    // 徹底禁止任何滑動，但不影響點擊
    document.addEventListener('touchmove', (e) => {
        if (profileOverlay.style.display !== 'block' || !e.target.closest('.input-field')) {
            e.preventDefault();
        }
    }, { passive: false });
</script>

</body>
</html>
