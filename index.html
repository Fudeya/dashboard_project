<style>

body{
  margin:0;
  height:100vh;
  font-family:Arial, Helvetica, sans-serif;

  /* 暗色科技背景 */
  background: linear-gradient(
    to bottom,
    #050b1a,
    #0a1f3f,
    #102a5c
  );

  overflow:hidden;
}

/* 科技格子 */
.square-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;

  background-image:
    linear-gradient(rgba(120,180,255,0.15) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,180,255,0.15) 1px, transparent 1px);

  background-size:70px 70px;

  animation:moveSquares 50s linear infinite;
}

/* 45度向左下 */
@keyframes moveSquares{
  from{
    background-position:0 0,0 0;
  }
  to{
    background-position:-300px 300px,-300px 300px;
  }
}

</style>
</html>
