<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Game Lobby</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:sans-serif;
color:white;

/* 科技背景 */
background:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(135deg,#020617,#0a1b3a);

background-size:40px 40px,40px 40px,cover;

animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
0%{
background-position:0 0,0 0,0 0;
}
100%{
background-position:-40px 40px,-40px 40px,0 0;
}
}

/* 玩家資訊 */

.player{
position:absolute;
top:40px;
left:40px;
display:flex;
align-items:center;
gap:15px;
}

.avatar{
width:60px;
height:60px;
border-radius:15px;
background:#ddd;
}

.name{
font-size:20px;
}

.rank{
opacity:0.6;
}

/* 資源 */

.resources{
position:absolute;
bottom:60px;
left:60px;
}

.gold{
color:#ffd54f;
}

/* 角色卡 */

.character{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:180px;
height:230px;
border-radius:20px;
background:rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

/* 六邊形設定 */

.settings{
position:absolute;
top:38%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
background:white;
clip-path:polygon(
25% 6%,
75% 6%,
100% 50%,
75% 94%,
25% 94%,
0% 50%
);
display:flex;
align-items:center;
justify-content:center;
color:black;
}

/* 右側選單 */

.menu{
position:absolute;
right:120px;
top:40%;
display:flex;
flex-direction:column;
gap:30px;
}

.btn{
padding:14px 30px;
border-radius:12px;
background:#4c8bf5;
border:none;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
transform:scale(1.1);
background:#6aa6ff;
}

/* 底部按鈕 */

.bottom-menu{
display:flex;
gap:20px;
}

</style>
</head>

<body>

<!-- 玩家資訊 -->
<div class="player">
<div class="avatar"></div>
<div>
<div class="name">Fudeya</div>
<div class="rank">RK 0</div>
</div>
</div>

<!-- 資源 -->
<div class="resources">
<div>銅幣: 0</div>
<div class="gold">金元素: 0</div>
</div>

<!-- 設定 -->
<div class="settings">
設定
</div>

<!-- 角色 -->
<div class="character">
角色
</div>

<!-- 右側選單 -->
<div class="menu">

<button class="btn">遊玩</button>

<button class="btn">自製區</button>

<div class="bottom-menu">
<button class="btn">圖鑑</button>
<button class="btn">店</button>
</div>

</div>

</body>
</html>
