<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game Lobby - Fixed</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            position: fixed; 
            background: #020617;
            font-family: sans-serif;
            -webkit-text-size-adjust: 100%;
        }

        /* 背景層 */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(135deg,#020617,#0a1b3a);
            background-size: 40px 40px, 40px 40px, cover;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: -40px 40px; } }

        /* UI 元素 */
        #tooltip {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(60, 60, 60, 0.85); backdrop-filter: blur(10px);
            padding: 12px 45px; border-radius: 15px; font-size: 20px; color: white;
            opacity: 0; transition: opacity 0.1s; z-index: 100; pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .character {
            position: absolute; bottom: 30px; left: 30px; width: 50%; height: 90%;
            display: flex; align-items: flex-end; justify-content: center; pointer-events: none;
        }
        .character img { max-height: 100%; object-fit: contain; animation: floating 8s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }

        .player { 
            position: absolute; top: 50px; left: 80px; display: flex; align-items: center; gap: 15px; 
            cursor: pointer; pointer-events: auto; z-index: 20; color: white;
        }
        .avatar { width: 85px; height: 85px; border-radius: 20px; background: #ddd; border: 3px solid rgba(255,255,255,0.2); }
        .resources { position: absolute; bottom: 80px; left: 80px; font-size: 22px; pointer-events: none; color: white; }

        .settings {
            position: absolute; top: 25%; left: 60%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; background: white; color: black; font-weight: bold;
            clip-path: polygon(25% 6%, 75% 6%, 100% 50%, 75% 94%, 25% 94%, 0% 50%);
            display: flex; align-items: center; justify-content: center; font-size: 26px;
            transition: all 0.15s ease-out; z-index: 10;
        }

        .menu { position: absolute; right: 65px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 30px; }
        .btn {
            padding: 28px 0; width: 330px; border-radius: 20px;
            background: #4c8bf5; border: none; color: white; font-size: 26px;
            transition: all 0.15s ease-out; text-align: center;
        }
        .btn-small { width: 155px; }

        .active-btn { background: #6aa6ff !important; box-shadow: 0 0 35px rgba(106, 166, 255, 0.9); transform: scale(1.1); }
        .active-settings { background: #f0f0f0 !important; transform: translate(-50%, -50%) scale(1.1) rotate(15deg) !important; box-shadow: 0 0 30px rgba(255,255,255,0.4); }

        /* 彈窗 */
        #profile-overlay {
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 500; display: none;
        }
        .tab-btn {
            padding: 20px; font-size: 22px; text-align: center; color: white;
            background: rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; transition: 0.2s;
        }
        .tab-active { background: #4c8bf5 !important; box-shadow: 0 0 15px #4c8bf5; }
        .input-field {
            width: 400px; padding: 15px; font-size: 20px; border-radius: 10px;
            border: 1px solid #4c8bf5; background: rgba(0,0,0,0.5); color: white; margin-bottom: 20px;
        }
        .action-btn { padding: 12px 30px; border-radius: 8px; border: none; font-size: 18px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="bg-layer"></div> 
    <div id="tooltip"></div>

    <div id="profile-overlay">
        <div class="interactive close-btn" data-tip="關閉介面" onclick="closeProfile()" style="position:absolute; top:40px; left:40px; width:60px; height:60px; background:rgba(255,255,255,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; border:1px solid white; cursor:pointer; color:white;">✕</div>
        <div style="display:flex; height:100%; padding:100px 150px;">
            <div style="width:200px; display:flex; flex-direction:column; gap:20px; border-right:1px solid rgba(255,255,255,0.2);">
                <div class="interactive tab-btn" id="tab-avatar" data-tip="修改頭像" onclick="switchTab('avatar')">頭像</div>
                <div class="interactive tab-btn" id="tab-name" data-tip="修改名稱" onclick="switchTab('name')">姓名</div>
                <div class="interactive tab-btn" id="tab-code" data-tip="輸入兌換碼" onclick="switchTab('code')">兌換碼</div>
            </div>
            <div id="tab-content" style="flex:1; padding-left:100px; padding-top:50px; display:flex; flex-direction:column; justify-content:flex-start; color:white;"></div>
        </div>
    </div>

    <div class="character"><img src="baikui_normal.png" alt="baikui"></div>

    <div class="player interactive" data-tip="個人資料" onclick="openProfile()">
        <div class="avatar"></div>
        <div>
            <div class="name" style="font-size: 30px; font-weight: bold;">Fudeya</div>
            <div class="rank" style="opacity: 0.6; font-size: 18px;">RK 0</div>
        </div>
    </div>

    <div class="resources">
        <div>銅: 0</div>
        <div style="color: #ffd54f;">金線材: 0</div>
    </div>

    <div class="interactive settings" data-tip="系統設定">設定</div>

    <div class="menu">
        <button class="interactive btn" data-tip="進入遊戲模式" data-target="play.html">遊玩</button>
        <button class="interactive btn" data-tip="查看分析資料" data-target="notebook.html">分析筆記本</button>
        <div style="display: flex; gap: 20px;">
            <button class="interactive btn btn-small" data-tip="查看已獲圖鑑" data-target="collection.html">圖鑑</button>
            <button class="interactive btn btn-small" data-tip="購買道具" data-target="shop.html">店</button>
        </div>
    </div>

    <script>
        const tooltip = document.getElementById('tooltip');
        const profileOverlay = document.getElementById('profile-overlay');
        let activeFingerId = null;
        let currentActiveEl = null;

        function openProfile() { profileOverlay.style.display = 'block'; switchTab('avatar'); }
        function closeProfile() { profileOverlay.style.display = 'none'; tooltip.style.opacity = '0'; }

        function switchTab(type) {
            const container = document.getElementById('tab-content');
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(t => t.classList.remove('tab-active'));
            if (type === 'avatar') {
                document.getElementById('tab-avatar').classList.add('tab-active');
                container.innerHTML = `<h2>頭像設定</h2><p style="opacity:0.5;">頭像選擇區域（暫略）</p>`;
            } else if (type === 'name') {
                document.getElementById('tab-name').classList.add('tab-active');
                container.innerHTML = `<h2>修改玩家名稱</h2><input type="text" id="newNameInput" class="input-field" placeholder="輸入新名稱..."><br><button class="interactive action-btn" style="background:#4c8bf5;" data-tip="保存名稱" onclick="saveName()">保存</button>`;
            } else if (type === 'code') {
                document.getElementById('tab-code').classList.add('tab-active');
                container.innerHTML = `<h2>兌換代碼</h2><input type="text" class="input-field" placeholder="請輸入兌換碼..."><br><button class="interactive action-btn" style="background:#ffd54f; color:black;" data-tip="確認兌換" onclick="alert('尚未開放')">確認</button>`;
            }
        }

        function saveName() {
            const newName = document.getElementById('newNameInput').value;
            if (newName && newName.trim() !== "") {
                document.querySelector('.player .name').innerText = newName;
                alert("名稱已更新為: " + newName);
            }
        }

        function checkCollision(x, y) {
            let hit = null;
            document.querySelectorAll('.interactive').forEach(el => {
                const rect = el.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) hit = el;
            });
            return hit;
        }

        function handleMove(x, y) {
            const hitEl = checkCollision(x, y);
            if (hitEl !== currentActiveEl) {
                if (currentActiveEl) currentActiveEl.classList.remove('active-btn', 'active-settings');
                if (hitEl) {
                    const isHex = hitEl.classList.contains('settings');
                    hitEl.classList.add(isHex ? 'active-settings' : 'active-btn');
                    tooltip.innerText = hitEl.getAttribute('data-tip');
                    tooltip.style.opacity = '1';
                } else { tooltip.style.opacity = '0'; }
                currentActiveEl = hitEl;
            }
        }

        // 觸摸與點擊跳轉修復
        window.addEventListener('touchstart', (e) => {
            if (activeFingerId === null) {
                activeFingerId = e.changedTouches[0].identifier;
                handleMove(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === activeFingerId) handleMove(t.clientX, t.clientY);
            }
            e.preventDefault(); // 鎖定滑動
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === activeFingerId) {
                    if (currentActiveEl) {
                        const target = currentActiveEl.getAttribute('data-target');
                        if (target) window.location.href = target;
                        else currentActiveEl.click();
                    }
                    activeFingerId = null;
                }
            }
        });

        // 視窗與鍵盤修正
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + "px";
                window.scrollTo(0, 0);
            });
        }
        document.addEventListener('focusout', () => { window.scrollTo(0, 0); });
    </script>
</body>
</html>
