<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Game Lobby - Updated Interaction</title>

<style>
body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: sans-serif;
    color: white;
    background:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(135deg,#020617,#0a1b3a);
    background-size: 40px 40px, 40px 40px, cover;
    animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
    0% { background-position: 0 0, 0 0, 0 0; }
    100% { background-position: -40px 40px, -40px 40px, 0 0; }
}

/* 固定在下方的提示標籤 */
#tooltip {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    background: rgba(80, 80, 80, 0.6);
    backdrop-filter: blur(8px);
    padding: 8px 25px;
    border-radius: 12px;
    font-size: 18px;
    color: white;
    opacity: 0;
    z-index: 9999;
    transition: opacity 0.15s ease;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* 角色圖片動畫 (8秒循環) */
.character {
    position: absolute;
    bottom: 30px; left: 30px; width: 50%; height: 90%;
    display: flex; align-items: flex-end; justify-content: center;
    pointer-events: none; z-index: 5;
}
.character img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    animation: floating 8s ease-in-out infinite;
}
@keyframes floating {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
}

/* 玩家與資源 */
.player { position: absolute; top: 50px; left: 80px; z-index: 10; display: flex; align-items: center; gap: 15px; pointer-events: none; }
.avatar { width: 70px; height: 70px; border-radius: 15px; background: #ddd; }
.resources { position: absolute; bottom: 80px; left: 80px; z-index: 10; pointer-events: none; }
.gold { color: #ffd54f; }

/* 按鈕基礎樣式 - 移除預設動畫，改由 class 控制 */
.settings, .btn {
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s, opacity 0.15s;
    z-index: 20;
}

/* 六邊形設定 */
.settings {
    position: absolute; top: 25%; left: 60%;
    transform: translate(-50%, -50%);
    width: 120px; height: 120px;
    background: white; color: black; font-weight: bold;
    clip-path: polygon(25% 6%, 75% 6%, 100% 50%, 75% 94%, 25% 94%, 0% 50%);
    display: flex; align-items: center; justify-content: center;
}

/* 右側選單 */
.menu {
    position: absolute; right: 50px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 25px;
}
.btn {
    padding: 20px 0; width: 280px; border-radius: 15px;
    background: #4c8bf5; border: none; color: white; font-size: 20px;
}
.bottom-menu { display: flex; gap: 20px; }
.btn-small { width: 130px; }

/* 懸停時的發光 (不包含旋轉) */
.settings:hover, .btn:hover {
    background: #6aa6ff;
    box-shadow: 0 0 25px rgba(106, 166, 255, 0.8);
}
.settings:hover { background: #f0f0f0; }

/* 點擊放開時觸發的動畫 Class */
.click-anim-hex { animation: hexRelease 0.4s ease-out; }
.click-anim-btn { animation: btnRelease 0.3s ease-out; }

@keyframes hexRelease {
    0% { transform: translate(-50%, -50%) scale(0.9) rotate(0deg); }
    30% { transform: translate(-50%, -50%) scale(1.2) rotate(20deg); }
    100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
}

@keyframes btnRelease {
    0% { transform: scale(0.95); }
    40% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

</style>
</head>

<body>

<div id="tooltip"></div>

<div class="character">
    <img src="baikui_normal.png" alt="Character">
</div>

<div class="player">
    <div class="avatar"></div>
    <div>
        <div class="name">Fudeya</div>
        <div class="rank">RK 0</div>
    </div>
</div>

<div class="resources">
    <div>銅幣: 0</div>
    <div class="gold">金元素: 0</div>
</div>

<div class="settings" data-tip="設定">設定</div>

<div class="menu">
    <button class="btn" data-tip="遊玩">遊玩</button>
    <button class="btn" data-tip="分析筆記本">分析筆記本</button>
    <div class="bottom-menu">
        <button class="btn btn-small" data-tip="圖鑑">圖鑑</button>
        <button class="btn btn-small" data-tip="店">店</button>
    </div>
</div>

<script>
    const tooltip = document.getElementById('tooltip');
    
    document.querySelectorAll('[data-tip]').forEach(el => {
        // 1. 顯示 Tooltip
        el.addEventListener('pointerenter', (e) => {
            tooltip.innerText = e.currentTarget.getAttribute('data-tip');
            tooltip.style.opacity = '1';
        });

        // 2. 隱藏 Tooltip
        el.addEventListener('pointerleave', () => {
            tooltip.style.opacity = '0';
        });

        // 3. 點擊放開瞬間執行特效
        el.addEventListener('pointerup', (e) => {
            const target = e.currentTarget;
            const isHex = target.classList.contains('settings');
            const animClass = isHex ? 'click-anim-hex' : 'click-anim-btn';

            // 先移除舊的 class (如果有的話)，再重新加入以觸發動畫
            target.classList.remove(animClass);
            void target.offsetWidth; // 強制重繪 (Reflow)
            target.classList.add(animClass);

            // 動畫結束後移除，以便下次點擊
            setTimeout(() => {
                target.classList.remove(animClass);
            }, 500);

            console.log("執行功能: " + target.getAttribute('data-tip'));
        });
    });
</script>

</body>
</html>
