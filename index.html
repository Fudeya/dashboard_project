<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Game Lobby - Spring Back Fix</title>
    <style>
        /* 允許捲動，但隱藏捲軸 */
        html, body {
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            background: #020617;
            font-family: sans-serif;
            color: white;
            -webkit-overflow-scrolling: touch;
        }

        /* 擴大背景層：防止位移時露白 */
        /* --- 擴大背景層：徹底覆蓋捲動邊界 --- */
.bg-layer {
    position: fixed; 
    /* 讓背景往上下左右各延伸 50%，確保怎麼滑都滑不出邊界 */
    top: -50vh; 
    left: -50vw; 
    width: 200vw; 
    height: 200vh;
    
    /* 保持你的方格設計 */
    background: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(135deg,#020617,#0a1b3a);
    background-size: 40px 40px, 40px 40px, cover;
    
    z-index: -1;
    pointer-events: none;
    
    /* 讓背景跟著稍微位移（可選），增加空間感 */
    transform: translateZ(0); 
}

        #main-ui {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .character { position: absolute; bottom: 30px; left: 30px; width: 50%; height: 90%; pointer-events: none; }
        .character img { max-height: 100%; object-fit: contain; }

        .player { position: absolute; top: 50px; left: 80px; display: flex; align-items: center; gap: 15px; cursor: pointer; z-index: 20; }
        .avatar { width: 85px; height: 85px; border-radius: 20px; background: #ddd; border: 3px solid rgba(255,255,255,0.2); }
        
        /* 資源欄位 */
        .resources { position: absolute; bottom: 80px; left: 80px; font-size: 22px; pointer-events: none; color: white; }

        /* 右側選單區 */
        .menu { position: absolute; right: 65px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 25px; }
        .btn { padding: 25px 0; width: 330px; border-radius: 20px; background: #4c8bf5; border: none; color: white; font-size: 26px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #357ae8; }
        .btn-small { width: 152px; }

        .settings {
            position: absolute; top: 25%; left: 60%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; background: white; color: black;
            clip-path: polygon(25% 6%, 75% 6%, 100% 50%, 75% 94%, 25% 94%, 0% 50%);
            display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold;
        }

        /* 彈窗樣式 */
        #profile-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 500; display: none;
        }

        .tab-btn { padding: 20px; font-size: 22px; color: white; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; margin-bottom: 15px; text-align: center; }
        .tab-active { background: #4c8bf5 !important; }
        .input-field { width: 400px; padding: 15px; font-size: 22px; border-radius: 10px; border: 2px solid #4c8bf5; background: #000; color: white; margin-top: 20px; }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<div id="main-ui">
    <div class="character"><img src="baikui_normal.png" alt="baikui"></div>
    
    <div class="player" onclick="openProfile()">
        <div class="avatar"></div>
        <div>
            <div class="name" style="font-size: 30px; font-weight: bold;">Fudeya</div>
            <div class="rank" style="opacity: 0.6; font-size: 18px;">RK 0</div>
        </div>
    </div>

    <div class="resources">
        <div>銅: 0</div>
        <div style="color: #ffd54f;">金線材: 0</div>
    </div>

    <div class="settings" onclick="alert('設定暫未開放')">設定</div>

    <div class="menu">
        <button class="btn" onclick="location.href='play.html'">遊玩</button>
        <button class="btn" onclick="location.href='notebook.html'">分析筆記本</button>
        <div style="display: flex; gap: 26px;">
            <button class="btn btn-small" onclick="location.href='collection.html'">圖鑑</button>
            <button class="btn btn-small" onclick="location.href='shop.html'">店</button>
        </div>
    </div>
</div>

<div id="profile-overlay">
    <div onclick="closeProfile()" style="position:absolute; top:40px; left:40px; width:60px; height:60px; color:white; font-size:45px; cursor:pointer;">✕</div>
    <div style="display:flex; height:100%; padding:80px 100px;">
        <div style="width:220px; border-right:1px solid rgba(255,255,255,0.2); padding-top:40px;">
            <div class="tab-btn" id="tab-avatar" onclick="switchTab('avatar')">頭像</div>
            <div class="tab-btn" id="tab-name" onclick="switchTab('name')">姓名</div>
            <div class="tab-btn" id="tab-code" onclick="switchTab('code')">兌換碼</div>
        </div>
        <div id="tab-content" style="flex:1; padding-left:60px; padding-top:40px;"></div>
    </div>
</div>

<script>
    const profileOverlay = document.getElementById('profile-overlay');
    let isTouching = false;

    function openProfile() {
        profileOverlay.style.display = 'block';
        switchTab('avatar');
    }

    function closeProfile() {
        profileOverlay.style.display = 'none';
        springBack();
    }

    function switchTab(type) {
        const container = document.getElementById('tab-content');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        if (type === 'avatar') {
            document.getElementById('tab-avatar').classList.add('tab-active');
            container.innerHTML = `<h1>頭像設定</h1><p>功能開發中...</p>`;
        } else if (type === 'name') {
            document.getElementById('tab-name').classList.add('tab-active');
            container.innerHTML = `<h1>修改名稱</h1><input type="text" id="newNameInput" class="input-field" placeholder="輸入名字..."><br><button class="btn" style="margin-top:20px; width:150px; font-size:20px; padding:10px 0;" onclick="saveName()">儲存</button>`;
        } else if (type === 'code') {
            document.getElementById('tab-code').classList.add('tab-active');
            container.innerHTML = `<h1>兌換碼</h1><input type="text" class="input-field" placeholder="輸入序號...">`;
        }
    }

    function saveName() {
        const val = document.getElementById('newNameInput').value;
        if(val) { document.querySelector('.player .name').innerText = val; alert('名稱已更新'); springBack(); }
    }

    // 強制歸位函數
    function springBack() {
        window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
    }

    // 監控使用者動作
    window.addEventListener('touchstart', () => { isTouching = true; });
    window.addEventListener('touchend', () => { 
        isTouching = false; 
        setTimeout(() => { if(!isTouching) springBack(); }, 1200); 
    });

    document.addEventListener('focusout', () => { setTimeout(springBack, 300); });

    // 如果頁面位置偏移，則自動拉回
    window.addEventListener('scroll', () => {
        if (!isTouching && window.scrollY !== 0) {
            clearTimeout(window.scrollTimeout);
            window.scrollTimeout = setTimeout(springBack, 800);
        }
    });
</script>

</body>
</html>
