<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Game Lobby - Updated Layout</title>

<style>
body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: sans-serif;
    color: white;
    background:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(135deg,#020617,#0a1b3a);
    background-size: 40px 40px, 40px 40px, cover;
    animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
    0% { background-position: 0 0, 0 0, 0 0; }
    100% { background-position: -40px 40px, -40px 40px, 0 0; }
}

/* 玩家資訊 - 移至左上角內部 */
.player {
    position: absolute;
    top: 50px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 10;
}

.avatar {
    width: 70px;
    height: 70px;
    border-radius: 15px;
    background: #ddd;
    border: 2px solid rgba(255,255,255,0.3);
}

.name { font-size: 24px; font-weight: bold; }
.rank { opacity: 0.7; font-size: 18px; }

/* 資源 - 移至左下角 */
.resources {
    position: absolute;
    bottom: 80px;
    left: 80px;
    z-index: 10;
    font-size: 18px;
    line-height: 1.8;
}

.gold { color: #ffd54f; }

    /* 角色區域 (移除邊框，改為純容器) */
.character {
    position: absolute;
    top: 30px;
    bottom: 30px;
    left: 30px;
    width: 50%; /* 佔據左側約一半 */
    display: flex;
    align-items: flex-end; /* 讓角色站在底部 */
    justify-content: center;
    pointer-events: none; 
    z-index: 5; /* 確保在背景格線上方 */
}

.character img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* 保持比例縮放 */
    /* 如果你想讓角色有點浮動感，可以加入以下動畫 */
    animation: floating 3s ease-in-out infinite;
}

@keyframes floating {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

/* 六邊形設定 - 放大並移動 */
.settings {
    position: absolute;
    top: 25%;
    left: 60%;
    transform: translate(-50%, -50%);
    width: 140px; /* 放大 */
    height: 140px;
    background: white;
    clip-path: polygon(25% 6%, 75% 6%, 100% 50%, 75% 94%, 25% 94%, 0% 50%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: black;
    font-weight: bold;
    font-size: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.settings:hover { transform: translate(-50%, -50%) scale(1.1) rotate(10deg); }

/* 右側選單區域 */
.menu {
    position: absolute;
    right: 50px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 25px;
    align-items: flex-end;
}

.btn {
    padding: 20px 0;
    width: 300px; /* 變長長方形 */
    border-radius: 15px;
    background: #4c8bf5;
    border: none;
    color: white;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.2s;
    text-align: center;
}

.btn:hover {
    background: #6aa6ff;
    box-shadow: 0 0 20px rgba(76, 139, 245, 0.5);
}

/* 底部按鈕組 (圖鑑與店) */
.bottom-menu {
    display: flex;
    gap: 20px;
}

.btn-small {
    width: 140px; /* 底部按鈕較小 */
}

</style>
</head>

<body>

<div class="character">
    <img src="baikui_normal.png" alt="Character Baikui">
</div>

<div class="player">
    <div class="avatar"></div>
    <div>
        <div class="name">Fudeya</div>
        <div class="rank">RK 0</div>
    </div>
</div>

<div class="resources">
    <div>銅幣: 0</div>
    <div class="gold">金元素: 0</div>
</div>

<div class="settings">
    設定
</div>

<div class="menu">
    <button class="btn">遊玩</button>
    <button class="btn">自製區</button>
    
    <div class="bottom-menu">
        <button class="btn btn-small">圖鑑</button>
        <button class="btn btn-small">店</button>
    </div>
</div>

</body>
</html>
