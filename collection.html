<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collection</title>
    <style>
        body {
            margin: 0; height: 100vh; width: 100vw; overflow: hidden;
            background: #020617; color: white; font-family: sans-serif;
            opacity: 0; transition: opacity 0.5s;
        }
        .header { padding: 30px 50px; font-size: 28px; }
        
        /* 網格佈局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px; padding: 0 50px; height: 70vh; overflow-y: auto;
        }

        .item-card {
            aspect-ratio: 1/1; background: rgba(255,255,255,0.1);
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .item-card .icon { width: 60%; height: 60%; background: #444; border-radius: 10px; margin-bottom: 10px; }

        .back-btn { position: absolute; bottom: 40px; left: 40px; padding: 15px 40px; border-radius: 12px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">圖鑑 / Collection</div>

    <div class="grid-container">
        <div class="item-card"><div class="icon"></div><span>物件 A</span></div>
        <div class="item-card"><div class="icon"></div><span>物件 B</span></div>
        <div class="item-card"><div class="icon"></div><span>物件 C</span></div>
        <div class="item-card"><div class="icon"></div><span>物件 D</span></div>
    </div>

    <button class="back-btn" onclick="goBack()">返回大廳</button>

    <script>
        window.onload = () => { document.body.style.opacity = '1'; };
        function goBack() { document.body.style.opacity = '0'; setTimeout(() => { window.location.href = 'index.html'; }, 500); }
    </script>
</body>
</html>
