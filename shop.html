<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop</title>
    <style>
        body {
            margin: 0; height: 100vh; width: 100vw; overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e, #020617);
            color: white; font-family: sans-serif; opacity: 0; transition: opacity 0.5s;
        }
        .top-bar { padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; }
        .currency { display: flex; gap: 20px; font-size: 20px; background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 30px; }

        .shop-items {
            display: flex; gap: 30px; padding: 50px; overflow-x: auto; white-space: nowrap;
        }

        .product {
            min-width: 250px; height: 350px; background: rgba(255,255,255,0.05);
            border-radius: 25px; border: 2px solid #ffd54f; padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .buy-btn { background: #ffd54f; color: black; border: none; padding: 10px; border-radius: 10px; font-weight: bold; }

        .back-btn { position: absolute; bottom: 40px; left: 40px; padding: 15px 40px; border-radius: 12px; background: rgba(255,255,255,0.1); border: 1px solid white; color: white; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div style="font-size: 28px;">商店 / Shop</div>
        <div class="currency">
            <span>銅幣: 0</span>
            <span style="color: #ffd54f;">金元素: 0</span>
        </div>
    </div>

    <div class="shop-items">
        <div class="product">
            <div style="font-size: 22px;">神秘藥水</div>
            <div style="height: 150px; background: rgba(255,255,255,0.1); border-radius: 15px;"></div>
            <button class="buy-btn">500 金元素</button>
        </div>
        </div>

    <button class="back-btn" onclick="goBack()">返回大廳</button>

    <script>
        window.onload = () => { document.body.style.opacity = '1'; };
        function goBack() { document.body.style.opacity = '0'; setTimeout(() => { window.location.href = 'index.html'; }, 500); }
    </script>
</body>
</html>
